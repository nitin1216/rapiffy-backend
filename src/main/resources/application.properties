spring.application.name=rapiffy-backend

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/rapiffy?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Server port
server.port=8080

# JWT
jwt.secret=rapiffy-super-secret-key-must-be-at-least-32-chars!!
jwt.expiration-ms=86400000

# Google OAuth2
google.client-id=YOUR_CLIENT_ID.apps.googleusercontent.com
